global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: saydin
    env: development

scrape_configs:
  # Saydin.Api — /metrics endpoint'ini açık tutar (OpenTelemetry Prometheus exporter)
  - job_name: saydin-api
    static_configs:
      - targets:
          - saydin-api:8080
    metrics_path: /metrics
    scrape_interval: 10s

  # Prometheus'un kendi metriklerini izle
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
